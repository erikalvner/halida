<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <!-- Only search for fonts inside the AppImage -->
    <dir>/usr/share/fonts</dir>

    <!-- Let fontconfig pick the best matching font -->
    <match target="pattern">
        <edit mode="assign" name="prefer">
            <string>sans-serif</string>
            <string>serif</string>
            <string>monospace</string>
        </edit>
    </match>
</fontconfig>
